<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pheonix Chat — Fullscreen Glass</title>

  <style>
  :root{
    --bg-overlay: linear-gradient(rgba(4,10,24,0.04), rgba(7,14,30,0.10));
    --text-color: rgba(255,255,255,0.98);
    --muted: rgba(255,255,255,0.72);
    --bubble-radius: 22px;
  }

  html,body{
    height:100%;
    margin:0;
    padding:0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    background: transparent;
    color: var(--text-color);
    overflow: hidden;
  }

  body::before{
    content: "";
    position: fixed;
    inset: 0;
    background-image: var(--bg-overlay), url('/chat-bg.png');
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    z-index: -2;
    filter: saturate(112%) contrast(102%);
  }

  body::after{
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 24%),
      radial-gradient(circle at top right, rgba(255,255,255,0.05), transparent 20%);
    z-index: -1;
    pointer-events: none;
  }

  .app-shell{
    height:100vh;
    width:100vw;
    display:flex;
    flex-direction:column;
    background: transparent;
  }

  header{
    padding: 14px 18px 8px;
    display:grid;
    grid-template-columns: 1fr auto 1fr;
    align-items:center;
    background: transparent;
  }

  .header-spacer{
    justify-self:start;
    min-height: 1px;
  }

  header h1{
    font-size:18px;
    margin:0;
    color:var(--text-color);
    font-weight:600;
    letter-spacing:0.3px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.25);
    justify-self:center;
  }

  .presence {
    justify-self:end;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: rgba(255,255,255,0.36);
    border: 1px solid rgba(255,255,255,0.30);
    box-shadow: 0 4px 12px rgba(2,6,23,0.18);
  }

  .presence.online{
    background: #34c759;
    border-color: rgba(255,255,255,0.55);
    box-shadow: 0 0 0 3px rgba(52,199,89,0.18), 0 0 16px rgba(52,199,89,0.45);
  }

  #message-area {
    flex: 1;
    overflow-y: auto;
    padding: 10px 18px 8px;
    display:flex;
    flex-direction:column;
    gap:12px;
    background: transparent;
    scroll-behavior: smooth;
  }

  #message-area::-webkit-scrollbar {
    width: 8px;
  }

  #message-area::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.16);
    border-radius: 999px;
  }

  .message{
    position: relative;
    max-width: min(72%,540px);
    padding: 12px 16px;
    border-radius: var(--bubble-radius);
    color: var(--text-color);
    font-size: 15px;
    line-height: 1.45;
    word-break: break-word;
    backdrop-filter: blur(34px) saturate(190%);
    -webkit-backdrop-filter: blur(34px) saturate(190%);
    background: rgba(255,255,255,0.015);
    border: 1px solid rgba(255,255,255,0.13);
    box-shadow: 0 8px 24px rgba(2,6,23,0.12), inset 0 1px 0 rgba(255,255,255,0.12);
    -webkit-backface-visibility: hidden;
    text-shadow: 0 1px 2px rgba(0,0,0,0.18);
  }

  .message::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius: inherit;
    pointer-events:none;
    background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.03));
    opacity:0.95;
  }

  .message::after{
    content:"";
    position:absolute;
    top:0;
    left:1px;
    right:1px;
    height: 34%;
    border-top-left-radius: inherit;
    border-top-right-radius: inherit;
    background: linear-gradient(180deg, rgba(255,255,255,0.34), rgba(255,255,255,0.02));
    pointer-events:none;
    opacity:0.65;
  }

  .my-message, .my-gif-message{
    margin-left:auto;
    background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.018));
    border: 1px solid rgba(255,255,255,0.15);
  }

  .others-message{
    margin-right:auto;
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015));
    border: 1px solid rgba(255,255,255,0.13);
  }

  .message img, .message video{
    display:block;
    max-width:100%;
    border-radius:14px;
    margin-top:0;
    box-shadow: 0 8px 24px rgba(2,6,23,0.20);
  }

  .typing-row{
    width: 100%;
    display:flex;
    justify-content:flex-start;
  }

  .typing-indicator{
    display:none;
    align-items:center;
    gap:8px;
    padding: 10px 14px;
    border-radius: 18px;
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015));
    border: 1px solid rgba(255,255,255,0.13);
    box-shadow: 0 8px 24px rgba(2,6,23,0.10), inset 0 1px 0 rgba(255,255,255,0.10);
  }

  .typing-indicator.show{
    display:inline-flex;
  }

  .typing-indicator span{
    width: 8px;
    height: 8px;
    border-radius:50%;
    background: rgba(255,255,255,0.85);
    animation: bounce 1.2s infinite ease-in-out;
  }

  .typing-indicator span:nth-child(2){ animation-delay: 0.15s; }
  .typing-indicator span:nth-child(3){ animation-delay: 0.3s; }

  @keyframes bounce{
    0%, 80%, 100% { transform: translateY(0); opacity: 0.45; }
    40% { transform: translateY(-4px); opacity: 1; }
  }

  .typing-wrap{
    padding: 8px 18px 18px;
    background: transparent;
  }

  .typing-area{
    display:flex;
    gap:12px;
    align-items:center;
    background: transparent;
  }

  .typing-box{
    flex:1;
    padding:12px 16px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(18px) saturate(150%);
    -webkit-backdrop-filter: blur(18px) saturate(150%);
    background: rgba(255,255,255,0.03);
    color: var(--text-color);
    outline:none;
    font-size:15px;
    box-shadow: 0 6px 18px rgba(2,6,23,0.10);
  }

  .typing-box::placeholder{
    color: rgba(255,255,255,0.68);
  }

  .send-button, .gif-button, .close-modal {
    border-radius: 999px;
    padding:12px 17px;
    margin: 23px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(18px) saturate(170%);
    -webkit-backdrop-filter: blur(18px) saturate(170%);
    color: var(--text-color);
    cursor:pointer;
    box-shadow: 0 6px 18px rgba(2,6,23,0.14);
  }

  .separator{ height:10px; }

  .gif-modal{
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(4,10,24,0.10);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 1000;
  }

  .gif-modal.open{
    display: flex;
  }

  .gif-modal-card{
    position: relative;
    width: min(1100px, 92vw);
    height: min(82vh, 760px);
    border-radius: 28px;
    overflow: hidden;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.14);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    box-shadow: 0 20px 60px rgba(2,6,23,0.22), inset 0 1px 0 rgba(255,255,255,0.16);
  }

  .gif-frame{
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
  }

  .gif-toolbar{
    position:absolute;
    top:14px;
    right:14px;
    z-index:2;
    display:flex;
    gap:8px;
  }

  @media (max-width:720px){
    #message-area{ padding: 8px 12px; }
    .typing-wrap{ padding: 8px 12px 12px; }
    .message{ max-width:86%; }
    header{ padding:12px 12px 6px; }
    .gif-modal{ padding: 12px; }
    .gif-modal-card{ width: 100%; height: 86vh; border-radius: 22px; }
  }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"
    integrity="sha512-v8ng/uGxkge3d1IJuEo6dJP8JViyvms0cly9pnbfRxT6/31c3dRWxIiwGnMSWwZjHKOuY3EVmijs7k1jz/9bLA=="
    crossorigin="anonymous"></script>
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"
    integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0="
    crossorigin="anonymous"></script>
</head>

<body>
  <div class="app-shell">
    <header>
      <div class="header-spacer"></div>
      <h1>Pheonix Chat</h1>
      <div class="presence" id="presence-indicator" title="Other user status"></div>
    </header>

    <div id="message-area">
      <div class="typing-row" id="typing-row" style="display:none;">
        <div class="typing-indicator" id="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <div class="typing-wrap">
      <div class="typing-area">
        <button class="gif-button" onclick="searchGif()"><span>GIF</span></button>
        <input id="typing-box" class="typing-box" type="text" placeholder="Type a message..."
          autofocus onKeyDown="if(event.keyCode==13) sendMessage();" oninput="onTypingChange();" />
        <button class="send-button" onclick="sendMessage()"><span>Send</span></button>
      </div>
    </div>
  </div>

  <div id="gif-modal" class="gif-modal">
    <div class="gif-modal-card">
      <div class="gif-toolbar">
        <button class="close-modal" onclick="closeGifModal()">Close</button>
      </div>
      <iframe id="gif-frame" class="gif-frame" src="" allowtransparency="true"></iframe>
    </div>
  </div>

<script>
  var socket = io.connect(window.location.origin, { transports: ['websocket', 'polling'] });
  var myUserId = 'user-' + Math.random().toString(36).slice(2,9);
  var typingTimer;

  function isImageUrl(text){
    return /\.(gif|webp|png|jpg|jpeg)(\?.*)?$/i.test(text) || /giphy\.com\/media\//i.test(text);
  }

  function isVideoUrl(text){
    return /\.(webm|mp4|mov)(\?.*)?$/i.test(text) || /media\d*\.tenor\.com.*\.mp4/i.test(text);
  }

  function createMessageNode(text, cls){
    var div = document.createElement('div');
    div.className = 'message ' + cls;
    if (isImageUrl(text)) {
      div.innerHTML = '<img src="' + text + '" style="width:220px;height:220px;object-fit:cover;" />';
    } else if (isVideoUrl(text)) {
      div.innerHTML = '<video loop autoplay muted playsinline style="width:220px;height:124px;object-fit:cover;"><source src="' + text + '"></video>';
    } else {
      div.textContent = text;
    }
    return div;
  }

  function appendMessage(text, cls){
    var area = document.getElementById('message-area');
    var typingRow = document.getElementById('typing-row');
    var div = createMessageNode(text, cls);
    area.insertBefore(div, typingRow);
    var sep = document.createElement('div');
    sep.className = 'separator';
    area.insertBefore(sep, typingRow);
    area.scrollTop = area.scrollHeight;
  }

  function setTypingVisible(show){
    var row = document.getElementById('typing-row');
    var indicator = document.getElementById('typing-indicator');
    row.style.display = show ? 'flex' : 'none';
    indicator.classList.toggle('show', !!show);
    var area = document.getElementById('message-area');
    area.scrollTop = area.scrollHeight;
  }

  socket.on('connect', function(){
    socket.emit('presence', { userId: myUserId });
  });

  socket.on('pheonix-message', function(msg){
    setTypingVisible(false);
    appendMessage(msg, 'others-message');
  });

  socket.on('presence-update', function(list){
    var other = list.find(function(item){ return item.userId !== myUserId; });
    var dot = document.getElementById('presence-indicator');
    if(other){
      dot.classList.add('online');
      setTypingVisible(!!other.typing);
    } else {
      dot.classList.remove('online');
      setTypingVisible(false);
    }
  });

  function sendGif(url){
    document.getElementById('typing-box').value = url;
    sendMessage();
    closeGifModal();
  }

  function sendMessage(){
    var box = document.getElementById('typing-box');
    var message = box.value.trim();
    if(!message) return;
    appendMessage(message, 'my-message');
    socket && socket.emit('pheonix-message', message);
    socket && socket.emit('typing', false);
    box.value = '';
    setTypingVisible(false);
  }

  function onTypingChange(){
    clearTimeout(typingTimer);
    socket && socket.emit('typing', true);
    typingTimer = setTimeout(function(){ socket && socket.emit('typing', false); }, 1200);
  }

  function searchGif(){
    var modal = document.getElementById('gif-modal');
    var frame = document.getElementById('gif-frame');
    frame.src = '/giphyCall';
    modal.classList.add('open');
  }

  function closeGifModal(){
    var modal = document.getElementById('gif-modal');
    var frame = document.getElementById('gif-frame');
    modal.classList.remove('open');
    frame.src = '';
  }

  document.getElementById('gif-modal').addEventListener('click', function(e){
    if (e.target.id === 'gif-modal') closeGifModal();
  });
</script>
</body>
</html>
